openapi: 3.1.0
info:
  title: ATH - Agent Trust Handshake Protocol
  description: >-
    The Agent Trust Handshake Protocol (ATH) is a lightweight, decentralized
    application-layer security protocol that establishes trusted connections
    between AI agents and external services. It builds on OAuth 2.0 with a
    trusted handshake — both the service and the user must approve before an
    agent can access anything.
  version: "0.1"
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://gateway.example.com
    description: Example ATH Gateway

paths:
  /.well-known/ath.json:
    get:
      operationId: discovery
      summary: Gateway Discovery
      description: >-
        Returns the gateway's discovery document listing available providers
        and the agent registration endpoint.
      tags:
        - Discovery
      responses:
        "200":
          description: Discovery document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryDocument"

  /ath/agents/register:
    post:
      operationId: registerAgent
      summary: Register Agent
      description: >-
        Registers a new agent with the ATH implementor (Phase A: app-side
        authorization). The implementor verifies the agent's identity and
        evaluates the requested capabilities against its approval policy.
      tags:
        - Registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRegistrationRequest"
      responses:
        "200":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRegistrationResponse"
        "401":
          description: Invalid agent attestation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ATHError"
        "409":
          description: Agent already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ATHError"

  /ath/agents/{clientId}:
    get:
      operationId: getAgent
      summary: Get Agent Status
      description: Check an agent's registration status and approved capabilities.
      tags:
        - Registration
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          description: The agent's client_id from registration
      responses:
        "200":
          description: Agent registration details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRegistrationResponse"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ATHError"

  /ath/authorize:
    post:
      operationId: authorize
      summary: Authorization Request
      description: >-
        Starts the user-side authorization flow (Phase B). The implementor
        verifies the agent is registered and approved, then initiates an
        OAuth consent flow with PKCE (RFC 7636) for the user.
      tags:
        - Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizationRequest"
      responses:
        "200":
          description: Authorization URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationResponse"
        "403":
          description: Agent not registered, not approved, or scope not approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ATHError"

  /ath/token:
    post:
      operationId: exchangeToken
      summary: Token Exchange
      description: >-
        Exchanges an OAuth authorization code for an ATH access token (Phase B,
        after user consent). The implementor computes the scope intersection
        and binds the token to the agent.
      tags:
        - Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenExchangeRequest"
      responses:
        "200":
          description: Token issued with scope intersection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid session or authorization code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ATHError"
        "403":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ATHError"

  /ath/proxy/{providerId}/{path}:
    get:
      operationId: proxyRequest
      summary: API Proxy
      description: >-
        Proxies API calls to the upstream service provider (Gateway Mode only).
        Validates the ATH token, verifies agent identity, checks scopes, and
        forwards the request.
      tags:
        - Proxy
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
          description: The provider to proxy the request to
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: The API path on the upstream service
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: "Bearer <ath_access_token>"
        - name: X-ATH-Agent-ID
          in: header
          required: true
          schema:
            type: string
            format: uri
          description: The agent's canonical URI
      responses:
        "200":
          description: Response from upstream service (pass-through)
        "401":
          description: Invalid or expired ATH token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ATHError"
        "403":
          description: Agent identity mismatch or scope violation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ATHError"

  /ath/revoke:
    post:
      operationId: revokeToken
      summary: Token Revocation
      description: >-
        Revokes an ATH access token, making it immediately unusable. Can be
        called by the agent, user, or administrator.
      tags:
        - Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRevocationRequest"
      responses:
        "200":
          description: Token revoked successfully

components:
  schemas:
    DiscoveryDocument:
      type: object
      required:
        - ath_version
        - gateway_id
        - agent_registration_endpoint
        - supported_providers
      properties:
        ath_version:
          type: string
          example: "0.1"
        gateway_id:
          type: string
          example: "ath-gateway.example.com"
        agent_registration_endpoint:
          type: string
          format: uri
          example: "https://ath-gateway.example.com/ath/agents/register"
        supported_providers:
          type: array
          items:
            $ref: "#/components/schemas/ProviderInfo"

    ProviderInfo:
      type: object
      required:
        - provider_id
        - display_name
        - available_scopes
        - auth_mode
        - agent_approval_required
      properties:
        provider_id:
          type: string
          example: "example-mail"
        display_name:
          type: string
          example: "Example Mail"
        categories:
          type: array
          items:
            type: string
          example: ["email", "productivity"]
        available_scopes:
          type: array
          items:
            type: string
          example: ["mail:read", "mail:send", "mail:delete"]
        auth_mode:
          type: string
          example: "OAUTH2"
        agent_approval_required:
          type: boolean
          example: true

    AgentRegistrationRequest:
      type: object
      required:
        - agent_id
        - agent_attestation
        - developer
        - requested_providers
      properties:
        agent_id:
          type: string
          format: uri
          description: The agent's canonical URI
          example: "https://travel-agent.example.com/.well-known/agent.json"
        agent_attestation:
          type: string
          description: Signed JWT proving agent identity
        developer:
          type: object
          required:
            - name
            - id
          properties:
            name:
              type: string
              example: "Example Corp"
            id:
              type: string
              example: "dev-example-12345"
        requested_providers:
          type: array
          items:
            type: object
            required:
              - provider_id
              - scopes
            properties:
              provider_id:
                type: string
                example: "example-mail"
              scopes:
                type: array
                items:
                  type: string
                example: ["mail:read", "mail:send"]
        purpose:
          type: string
          description: Human-readable description of agent's purpose
          example: "Travel planning assistant"
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
          example: ["https://travel-agent.example.com/callback"]

    AgentRegistrationResponse:
      type: object
      required:
        - client_id
        - client_secret
        - agent_status
        - approved_providers
        - approval_expires
      properties:
        client_id:
          type: string
          example: "ath_travelbot_001"
        client_secret:
          type: string
          example: "ath_secret_xxxxx"
        agent_status:
          type: string
          enum: ["approved", "pending", "denied"]
          example: "approved"
        approved_providers:
          type: array
          items:
            $ref: "#/components/schemas/ProviderApproval"
        approval_expires:
          type: string
          format: date-time
          example: "2027-01-01T00:00:00Z"

    ProviderApproval:
      type: object
      required:
        - provider_id
        - approved_scopes
        - denied_scopes
      properties:
        provider_id:
          type: string
          example: "example-mail"
        approved_scopes:
          type: array
          items:
            type: string
          example: ["mail:read"]
        denied_scopes:
          type: array
          items:
            type: string
          example: ["mail:send"]
        denial_reason:
          type: string
          example: "Send capability requires additional review"

    AuthorizationRequest:
      type: object
      required:
        - client_id
        - agent_attestation
        - provider_id
        - scopes
      properties:
        client_id:
          type: string
          example: "ath_travelbot_001"
        agent_attestation:
          type: string
          description: Fresh signed JWT proving agent identity
        provider_id:
          type: string
          example: "example-mail"
        scopes:
          type: array
          items:
            type: string
          description: Scopes to request (must be within approved set)
          example: ["mail:read"]
        user_redirect_uri:
          type: string
          format: uri
          example: "https://travel-agent.example.com/callback"
        state:
          type: string
          description: Opaque state for CSRF protection
        resource:
          type: string
          format: uri
          description: "Target resource server URI (RFC 8707)"
          example: "https://api.example.com/v1"

    AuthorizationResponse:
      type: object
      required:
        - authorization_url
        - ath_session_id
      properties:
        authorization_url:
          type: string
          format: uri
          description: "URL with PKCE parameters (code_challenge, code_challenge_method=S256)"
        ath_session_id:
          type: string
          description: Session identifier for the token exchange step
          example: "ath_sess_abc123"

    TokenExchangeRequest:
      type: object
      required:
        - grant_type
        - client_id
        - client_secret
        - code
        - ath_session_id
      properties:
        grant_type:
          type: string
          enum: ["authorization_code"]
          example: "authorization_code"
        client_id:
          type: string
          example: "ath_travelbot_001"
        client_secret:
          type: string
          example: "ath_secret_xxxxx"
        code:
          type: string
          description: OAuth authorization code from the callback
        ath_session_id:
          type: string
          description: Session ID from the authorization step
          example: "ath_sess_abc123"

    TokenResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
        - effective_scopes
        - provider_id
        - agent_id
        - scope_intersection
      properties:
        access_token:
          type: string
          example: "ath_tk_xxxxxxxx"
        token_type:
          type: string
          enum: ["Bearer"]
          example: "Bearer"
        expires_in:
          type: integer
          description: Token lifetime in seconds
          example: 3600
        effective_scopes:
          type: array
          items:
            type: string
          example: ["mail:read"]
        provider_id:
          type: string
          example: "example-mail"
        agent_id:
          type: string
          format: uri
          example: "https://travel-agent.example.com/.well-known/agent.json"
        scope_intersection:
          $ref: "#/components/schemas/ScopeIntersection"

    ScopeIntersection:
      type: object
      required:
        - agent_approved
        - user_consented
        - effective
      properties:
        agent_approved:
          type: array
          items:
            type: string
          example: ["mail:read"]
        user_consented:
          type: array
          items:
            type: string
          example: ["mail:read", "mail:send"]
        effective:
          type: array
          items:
            type: string
          example: ["mail:read"]

    TokenRevocationRequest:
      type: object
      required:
        - client_id
        - token
      properties:
        client_id:
          type: string
          example: "ath_travelbot_001"
        token:
          type: string
          description: The ATH access token to revoke
          example: "ath_tk_xxxxxxxx"

    ATHError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: "INVALID_ATTESTATION"
        message:
          type: string
          description: Human-readable error message
          example: "Agent attestation JWT has expired"
        details:
          type: object
          additionalProperties: true
          description: Additional error details
