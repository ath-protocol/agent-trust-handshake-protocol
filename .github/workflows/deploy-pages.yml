name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Mintlify CLI
        run: npm install -g mintlify

      - name: Export static site
        run: mint export --output export.zip

      - name: Prepare static files
        run: |
          mkdir -p _site
          cd _site
          unzip ../export.zip
          rm -f serve.js "Start Docs.bat" "Start Docs.command"
          touch .nojekyll

      - name: Optimize output (prefetch + preload + service worker + path rewrite)
        env:
          SITE_DIR: _site
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: python3 scripts/optimize-site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
